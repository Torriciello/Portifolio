<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo perfil</title>
    <link rel="stylesheet" href="../css/cadastro_perfil.estilo.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>

  <body>
    <header class="topbar">
      <button class="back" onclick="window.history.back()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h2>Novo perfil</h2>
      <button class="menu"><i class="fa-solid fa-ellipsis-vertical"></i></button>
    </header>

    <main class="container">
      <form id="formMedico">
        <h3 class="section-title">Profissional</h3>
        <input type="text" id="nome" placeholder="Nome completo" required />

        <div class="row">
          <select id="especialidade" required>
            <option value="">Selecione a Especialidade</option>
            <option value="GINECOLOGIA">Ginecologia</option>
            <option value="ORTOPEDIA">Ortopedia</option>
            <option value="CARDIOLOGIA">Cardiologia</option>
            <option value="PEDIATRIA">Pediatria</option>
            <option value="PSQUIATRIA">Psiquiatria</option>
            <option value="GASTROENTOROLOGIA">Gastroenterologia</option>
          </select>

          <input type="text" id="crm" placeholder="CRM" required />
        </div>

        <h3 class="section-title">Contatos</h3>
        <input type="email" id="email" placeholder="E-mail" required />
        <input type="text" id="telefone" placeholder="Telefone ou celular" required />

        <h3 class="section-title">Endereço profissional</h3>
        <input type="text" id="logradouro" placeholder="Logradouro" required />

        <div class="row">
          <input type="text" id="numero" placeholder="Número" required />
          <input type="text" id="complemento" placeholder="Complemento" />
        </div>

        <input type="text" id="cidade" placeholder="Cidade" required />

        <div class="row">
          <select id="uf" required>
            <option value="">UF</option>
            <option value="SP">SP</option>
            <option value="RJ">RJ</option>
            <option value="MG">MG</option>
            <option value="PR">PR</option>
          </select>
          <input type="text" id="cep" placeholder="CEP" required />
        </div>

        <button class="btn-primary" type="submit">Concluir cadastro</button>
        <button class="btn-secondary" type="button" onclick="window.location.href='home.html'">Cancelar</button>
      </form>
    </main>
    <script src="../js/cadastro_medico.js"></script>
  </body>
</html>
