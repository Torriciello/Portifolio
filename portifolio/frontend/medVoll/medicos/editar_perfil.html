<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novo perfil</title>

    <link rel="stylesheet" href="../css/cadastro_perfil_paciente.estilo.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="topbar">
      <button class="back">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <h2>Editar</h2>

      <button class="menu">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </header>

    <main class="container">
      <form>
        <h3 class="section-title">Profissional</h3>

        <input
          type="text"
          value="Gabriel Torriciello"
          placeholder="Nome completo"
        />

        <div class="row">
          <select>
            <option>Especialidade</option>
            <option>Clínico Geral</option>
            <option>Ginecologista</option>
            <option>Ortopedista</option>
          </select>

          <input type="text" value="47.889-PR" placeholder="CRM" />
        </div>

        <h3 class="section-title">Contatos</h3>

        <input
          type="email"
          value="gabriel.torriciello@example.com"
          placeholder="E-mail"
        />

        <input
          type="text"
          value="(11) 99999-9999"
          placeholder="Telefone ou celular"
        />

        <h3 class="section-title">Endereço profissional</h3>

        <input
          type="text"
          value="Rua das Flores, 123"
          placeholder="Logradouro"
        />

        <div class="row">
          <input type="text" value="123" placeholder="Número" />

          <input type="text" value="Apartment 4B" placeholder="Complemento" />
        </div>

        <input type="text" value="São Paulo" placeholder="Cidade" />

        <div class="row">
          <select>
            <option>UF</option>
            <option>SP</option>
            <option>RJ</option>
            <option>MG</option>
            <option>PR</option>
          </select>

          <input type="text" placeholder="CEP" />
        </div>

        <button class="btn-primary" type="submit">Concluir cadastro</button>

        <button class="btn-secondary" type="button">Cancelar</button>
      </form>
    </main>
  </body>
</html>
