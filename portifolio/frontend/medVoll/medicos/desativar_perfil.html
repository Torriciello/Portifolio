<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desativar Perfil</title>
    <link rel="stylesheet" href="../css/desativar_perfil.estilo.css" />
  </head>
  <body>
    <div class="modal-container">
      <div class="profile-icon-container">
        <div class="profile-icon">
          <img src="../img/noun-inactive-user-93754 1.png" alt="" />
        </div>
      </div>

      <h2 class="title">Deseja desativar este perfil?</h2>

      <div class="profile-card">
        <div class="blue-accent"></div>
        <div class="profile-info">
          <span class="name">Brenda de Almeida</span>
          <span class="specialty">Ortopedista | CRM 47.889-PR</span>
        </div>
      </div>

      <div class="info-text">
        <p>
          Ao desativar este perfil, suas informações ficarão desabilitadas para
          pesquisas e futuros agendamentos.
        </p>
        <p>
          Certifique-se que não há consultas agendadas, caso tenha, a
          desativação não poderá ser concluída.
        </p>
      </div>

      <div class="actions">
        <button class="btn btn-primary">Desativar este perfil</button>
        <button class="btn btn-secondary">Cancelar</button>
      </div>
    </div>
  </body>
</html>
