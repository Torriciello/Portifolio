<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consultas</title>

    <link rel="stylesheet" href="../css/consulta.estilo.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="topbar">
      <button class="back">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <h2>Consultas</h2>

      <button class="menu">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </header>

    <main class="content">
        <div class="search-container">
            <input type="text" placeholder="Pesquisar">
            <span class="search-icon">&#128269;</span>
        </div>

        <section class="date-group">
            <h2 class="date-title">Hoje <span>(18/08/2022)</span> <i class="icon-calendar"></i></h2>
            
            <div class="appointment-item">
                <div class="appointment-header">
                    <strong>9h00</strong>
                    <span class="arrow-down">&#9662;</span>
                </div>
                <div class="appointment-details">
                    <p class="doctor-name">Adriano Moreira Sales</p>
                    <p class="doctor-info">Ginecologista | CRM 15.879-SP</p>
                    <p class="patient-name">Marcela Trindade</p>
                    <p class="patient-label">Paciente</p>
                </div>
            </div>

            <div class="appointment-item expanded">
                <div class="appointment-header">
                    <strong>10h00</strong>
                    <span class="arrow-up">&#9652;</span>
                </div>
                <div class="appointment-details">
                    <p class="doctor-name">Brenda de Almeida</p>
                    <p class="doctor-info">Ortopedista | CRM 47.889-PR</p>
                    <p class="patient-name">Pâmela Lopes</p>
                    <p class="patient-label">Paciente</p>
                    
                    <div class="appointment-actions">
                        <button class="btn-outline">Editar</button>
                        <button class="btn-outline">Cancelar consulta</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <button class="btn-primary">Agendar nova consulta</button>
    </footer>

</body>
</html>
