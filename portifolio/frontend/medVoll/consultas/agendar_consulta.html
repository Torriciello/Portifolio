<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendar Consultas</title>

    <link rel="stylesheet" href="../css/cadastro_perfil_paciente.estilo.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="topbar">
      <button class="back">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <h2>Consultas</h2>

      <button class="menu">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </header>

    <main class="container">
      <form>
        <h3 class="section-title">Envolvidos</h3>

        <input type="text" placeholder="Nome do Paciente" /> <br />

        <input type="text" placeholder="Nome do Medico" />

        <input type="date" placeholder="Data" />

        <div class="time">
          <select>
            <option>Horario da consulta</option>
            <option>07:00</option>
            <option>07:30</option>
            <option>08:00</option>
            <option>08:30</option>
            <option>09:00</option>
            <option>09:30</option>
            <option>10:00</option>
            <option>10:30</option>
            <option>11:00</option>
            <option>11:30</option>
            <option>12:30</option>
            <option>13:00</option>
            <option>13:30</option>
            <option>14:00</option>
            <option>14:30</option>
            <option>15:00</option>
            <option>15:30</option>
            <option>16:00</option>
            <option>16:30</option>
            <option>17:00</option>
            <option>17:30</option>
            <option>16:00</option>
          </select>
        </div>

        <button class="btn-primary" type="submit">Agendar consulta</button>

        <button class="btn-secondary" type="button">Cancelar</button>
      </form>
    </main>
  </body>
</html>
