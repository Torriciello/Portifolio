<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desativar Perfil</title>
    <link
      rel="stylesheet"
      href="../css/desativar_perfil_menssagem.estilo.css"
    />
  </head>
  <body>
    <div class="modal-container">
      <div class="profile-icon-container">
        <div class="profile-icon">
          <img src="../img/noun-inactive-user-93754 1.png" alt="" />
        </div>
      </div>
      <div class="info-text">
        <p>Não foi possível desativar este perfil</p>
        <p>
          Certifique-se que não há consultas agendadas, caso tenha, a
          desativação não poderá ser concluída.
        </p>
      </div>

      <div class="actions">
        <button class="btn btn-primary">Entendi</button>
      </div>
    </div>
  </body>
</html>
