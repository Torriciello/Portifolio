<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pacientes</title>

    <link rel="stylesheet" href="../css/lista_pacientes.estilo.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="topbar">
      <button class="back">
        <i class="fa-solid fa-arrow-left"></i>
      </button>

      <h2>Pacientes</h2>

      <button class="menu">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </header>

    <main class="container">
      <div class="search-box">
        <input type="text" placeholder="Pesquisar" />
        <i class="fa-solid fa-search"></i>
      </div>

      <div class="letter">
        <span>A</span>
      </div>

      <div class="paciente">
        <div class="paciente-info">
          <h3>Adriano Moreira Sales</h3>
          <p>11979977675</p>
        </div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>

      <div class="paciente">
        <div class="paciente-info">
          <h3>Amanda Siqueira</h3>
          <p>11989966575</p>
        </div>

        <i class="fa-solid fa-chevron-down"></i>
      </div>

      <div class="paciente">
        <div class="paciente-info">
          <h3>Antônio Santana</h3>
          <p>11999999999</p>
        </div>

        <i class="fa-solid fa-chevron-down"></i>
      </div>

      <div class="letter">
        <span>B</span>
      </div>

      <div class="paciente-open">
        <div class="paciente-info">
          <h3>Brenda de Almeida</h3>
          <p>11999999999</p>
        </div>

        <i class="fa-solid fa-chevron-up"></i>
      </div>

      <div class="paciente-details">
        <p>brenda.almeida@med.com</p>
        <p>(51) 99999-8888</p>

        <p>
          Av. das Graças Altas, 633 - Curitiba/PR<br />
          CEP: 66.777-100
        </p>

        <div class="actions">
          <button class="edit">Editar</button>
          <button class="disable">Desativar perfil</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <button class="add">Cadastrar novo perfil</button>
    </footer>
  </body>
</html>
